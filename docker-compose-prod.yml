version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: popco-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - popco-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  popco-admin:
    image: ${DOCKER_HUB}/popco-admin:${IMAGE_TAG:-latest}
    container_name: popco-admin
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./secrets/application-secret.properties:/app/config/application-secret.properties:ro
      - admin_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - popco-network
    restart: unless-stopped

  popco-client:
    image: ${DOCKER_HUB}/popco-client:${IMAGE_TAG:-latest}
    container_name: popco-client
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./secrets/application-secret.properties:/app/config/application-secret.properties:ro
      - client_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - popco-network
    restart: unless-stopped

  front:
    image: ${DOCKER_HUB}/popco-front:${IMAGE_TAG:-latest}
    container_name: popco-front
    ports:
      - "80:80"
    networks:
      - popco-network
    restart: unless-stopped
    depends_on:
      - popco-admin
      - popco-client

networks:
  popco-network:
    driver: bridge

volumes:
  redis_data:
    driver: local