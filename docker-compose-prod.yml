version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: popco-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - popco-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  elasticsearch:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    container_name: popco-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - popco-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: kibana:8.11.0
    container_name: popco-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - popco-network
    restart: unless-stopped

  popco-admin:
    image: ${DOCKER_HUB}/popco-admin:${IMAGE_TAG:-latest}
    container_name: popco-admin
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./secrets/application-admin-secret.properties:/app/config/application-admin-secret.properties:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - popco-network
    restart: unless-stopped

  popco-client:
    image: ${DOCKER_HUB}/popco-client:${IMAGE_TAG:-latest}
    container_name: popco-client
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELASTICSEARCH_URI=${ELASTICSEARCH_URI}
    volumes:
      - ./secrets/application-client-secret.properties:/app/config/application-client-secret.properties:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - popco-network
    restart: unless-stopped

  front:
    image: ${DOCKER_HUB}/popco-front:${IMAGE_TAG:-latest}
    container_name: popco-front
    ports:
      - "80:80"
    networks:
      - popco-network
    restart: unless-stopped
    depends_on:
      - popco-admin
      - popco-client

networks:
  popco-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local