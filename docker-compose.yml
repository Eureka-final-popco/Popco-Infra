version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: popco-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - popco-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: popco-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - popco-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  popco-admin:
    build:
      context: ../Popco-Admin
      dockerfile: Dockerfile
    container_name: popco-admin
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - popco-network
    restart: unless-stopped

  popco-client:
    build:
      context: ../Popco-Client
      dockerfile: Dockerfile
    container_name: popco-client
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - popco-network
    restart: unless-stopped

  popco-ai:
     build:
       context: ../Popco-Ai
       dockerfile: Dockerfile
     container_name: popco-ai
     ports:
       - "8083:8000"
     env_file:
       - ../Popco-Ai/.env.docker
     environment:
       - DOCKER_ENV=true
       - DB_HOST=${DB_HOST}
       - DB_PORT=${DB_PORT}
       - DB_NAME=${DB_NAME}
       - DB_USERNAME=${DB_USERNAME}
       - DB_PASSWORD=${DB_PASSWORD}
       - REDIS_HOST=${REDIS_HOST}
       - REDIS_PORT=${REDIS_PORT}
     networks:
       - popco-network
     depends_on:
       mysql:
         condition: service_healthy
       redis:
         condition: service_healthy
     restart: unless-stopped

  nginx:
    build:
      context: ../Popco-Front
      dockerfile: Dockerfile
    container_name: popco-nginx
    ports:
      - "80:80"
    networks:
      - popco-network
    restart: unless-stopped
    depends_on:
      - popco-admin
      - popco-client
      - popco-ai

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  popco-network:
    driver: bridge