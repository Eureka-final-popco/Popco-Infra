# This is a basic workflow to help you get started with Actions
name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "dev" branch
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]
  schedule:
    - cron: '0 21 * * *'  # 한국시간 새벽 6시
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  validate:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          # Docker Compose V2는 docker compose (공백)로 사용
          docker compose version || {
            echo "Installing Docker Compose..."
            sudo apt-get update
            sudo apt-get install -y docker-compose-plugin
          }

      - name: Set up environment variables for testing
        run: |
          echo "🔧 Setting up test environment variables..."
          
          # GitHub Actions용 임시 환경변수 설정
          cat > .env << EOF
          MYSQL_ROOT_PASSWORD=test_password
          MYSQL_DATABASE=test_db
          MYSQL_USER=test_user
          MYSQL_PASSWORD=test_password
          SPRING_PROFILES_ACTIVE=test
          DB_HOST=localhost
          DB_PORT=3306
          DB_NAME=test_db
          DB_USERNAME=test_user
          DB_PASSWORD=test_password
          REDIS_HOST=localhost
          REDIS_PORT=6379
          EOF
          
          echo "✅ Test environment variables created"

      - name: Validate docker-compose files
        run: |
          echo "🔍 Checking for docker-compose files..."
          
          if [ -f docker-compose.yml ]; then
            echo "✅ Found docker-compose.yml - validating..."
            docker compose config
          else
            echo "❌ docker-compose.yml not found"
            exit 1
          fi
          
          if [ -f docker-compose-deploy.yml ]; then
            echo "✅ Found docker-compose-deploy.yml - validating..."
            docker compose -f docker-compose-deploy.yml config
          fi

      - name: Check services and volumes
        run: |
          echo "📋 Listing services..."
          docker compose config --services
          
          echo "💾 Listing volumes..."
          docker compose config --volumes

      - name: Security check
        run: |
          echo "🔒 Running security checks..."
          
          # Check for privileged containers
          if grep -r "privileged.*true" *.yml 2>/dev/null; then
            echo "⚠️  Warning: Found privileged containers"
          else
            echo "✅ No privileged containers found"
          fi
          
          # Check for host network mode
          if grep -r "network_mode.*host" *.yml 2>/dev/null; then
            echo "⚠️  Warning: Found host network mode"
          else
            echo "✅ No host network mode found"
          fi

      - name: Environment file check
        run: |
          echo "🌍 Checking environment configuration..."
          
          # .env는 gitignore되어 있어서 확인 불가
          echo "ℹ️  .env file should be in .gitignore for security"
          
          # docker-compose.yml에서 env_file 사용 여부 확인
          if grep -q "env_file" docker-compose.yml 2>/dev/null; then
            echo "📝 Environment file dependency detected in docker-compose.yml"
            echo "💡 Make sure to provide .env file during deployment"
          fi
          
          # 환경변수 사용 여부 확인
          if grep -q "\${.*}" docker-compose.yml 2>/dev/null; then
            echo "🔧 Environment variables detected in docker-compose.yml"
            echo "💡 Make sure all required environment variables are set"
          fi
