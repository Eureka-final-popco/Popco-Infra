# 워크플로우 이름
name: CI/CD Pipeline for Spring Boot

# 워크플로우 실행 조건
on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]
  workflow_dispatch:

jobs:
  # ==================================
  #  1. 환경 설정 검증 작업
  # ==================================
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 📝 Validate Environment Configuration
        run: |
          echo "🌍 Validating environment configuration..."

          # .env.example 파일 존재 여부 확인
          if [ ! -f .env.example ]; then
            echo "❌ Critical: .env.example file not found!"
            exit 1
          fi
          echo "✅ .env.example found."

          # docker-compose.yml에서 필요한 변수 목록 추출
          REQUIRED_VARS=$(grep -oP '\$\{\K[a-zA-Z0-9_]+' docker-compose.yml | sort -u)
          echo "📋 Variables required by docker-compose.yml:"
          echo "$REQUIRED_VARS"
          
          # .env.example에 모든 필수 변수가 정의되어 있는지 확인
          MISSING_VARS=""
          for VAR in $REQUIRED_VARS; do
            if ! grep -q "^${VAR}=" .env.example; then
              MISSING_VARS="$MISSING_VARS $VAR"
            fi
          done

          if [ -n "$MISSING_VARS" ]; then
            echo "❌ Critical: The following variables are missing from .env.example: $MISSING_VARS"
            exit 1
          else
            echo "✅ All required variables are defined in .env.example."
          fi

  # ==================================
  #  2. 빌드 및 도커 이미지 배포 작업
  # ==================================
  build-and-deploy:
    # `validate` 작업이 성공해야만 실행
    needs: validate
    # `dev` 브랜치에 push 되었을 때만 실행
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GHCR에 이미지를 푸시하기 위한 권한

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle for caching
        uses: gradle/actions/setup-gradle@v4

      - name: ✨ Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🛠️ Build with Gradle
        # Spring Boot 테스트는 `test` 프로파일(H2 DB)을 사용하므로 secret 없이 성공함
        run: ./gradlew build --info

      - name: 🔐 Create .env file for Docker build
        # GitHub Secrets에서 실제 배포용 환경 변수들을 가져와 .env 파일 생성
        # 이 .env 파일은 Docker 빌드 시 컨테이너 내부로 복사될 수 있음
        run: |
          echo "Creating .env file from secrets..."
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .env
          echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env
          # 필요한 다른 모든 환경 변수들을 여기에 추가
          
      - name: 🐳 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          # Dockerfile이 .env 파일을 사용한다면 build-args 또는 secrets를 통해 전달할 수 있음
