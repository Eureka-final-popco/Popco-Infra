# 워크플로우 이름
name: Validate Compose File Syntax

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]
  workflow_dispatch:

jobs:
  validate-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 📝 Validate docker-compose file syntax
        run: |
          # docker-compose.yml이 요구하는 임시 파일을 생성하여 오류를 방지
          echo "Creating dummy files to bypass env_file error..."
          mkdir -p ./Popco-Ai
          touch ./Popco-Ai/.env.docker

          # docker-compose.yml 파일의 문법만 검사
          echo "Validating docker-compose.yml syntax..."
          docker compose -f docker-compose.yml config > /dev/null
          echo "✅ docker-compose.yml syntax is valid."
          
          # docker-compose-deploy.yml 파일이 있다면 함께 검사
          if [ -f docker-compose-deploy.yml ]; then
            echo "Validating docker-compose-deploy.yml syntax..."
            docker compose -f docker-compose-deploy.yml config > /dev/null
            echo "✅ docker-compose-deploy.yml syntax is valid."
          fi
