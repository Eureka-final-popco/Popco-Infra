# This is a basic workflow to help you get started with Actions
name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "dev" branch
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]
  schedule:
    - cron: '0 21 * * *'  # 한국시간 새벽 6시
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  validate:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Validate docker-compose files
        run: |
          echo "🔍 Checking for docker-compose files..."
          
          if [ -f docker-compose.yml ]; then
            echo "✅ Found docker-compose.yml - validating..."
            docker-compose config
          else
            echo "❌ docker-compose.yml not found"
            exit 1
          fi
          
          if [ -f docker-compose-deploy.yml ]; then
            echo "✅ Found docker-compose-deploy.yml - validating..."
            docker-compose -f docker-compose-deploy.yml config
          fi

      - name: Check services and volumes
        run: |
          echo "📋 Listing services..."
          docker-compose config --services
          
          echo "💾 Listing volumes..."
          docker-compose config --volumes

      - name: Security check
        run: |
          echo "🔒 Running security checks..."
          
          # Check for privileged containers
          if grep -r "privileged.*true" *.yml 2>/dev/null; then
            echo "⚠️  Warning: Found privileged containers"
          else
            echo "✅ No privileged containers found"
          fi
          
          # Check for host network mode
          if grep -r "network_mode.*host" *.yml 2>/dev/null; then
            echo "⚠️  Warning: Found host network mode"
          else
            echo "✅ No host network mode found"
          fi

      - name: Environment file check
        run: |
          echo "🌍 Checking environment files..."
          
          if [ -f .env ]; then
            echo "✅ .env file found"
          fi
          
          if [ ! -f .env.example ]; then
            echo "💡 .env.example not found - consider adding one for documentation"
          else
            echo "✅ .env.example found"
          fi
