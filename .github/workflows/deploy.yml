name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (all, admin, client, front)'
        required: false
        default: 'all'
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to EC2
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << 'EOF'
            set -e
          
            echo "=== Popco 배포 시작 ==="
            cd ~/Popco-Infra
          
            # Git pull
            echo "1. 최신 코드 가져오기..."
            git pull origin dev
          
            # .env 파일 확인
            if [ ! -f .env ]; then
              echo "ERROR: .env 파일이 없습니다!"
              exit 1
            fi
          
            # secrets 디렉토리 및 파일 확인
            if [ ! -f secrets/application-secret.properties ]; then
              echo "ERROR: secrets/application-secret.properties 파일이 없습니다!"
              exit 1
            fi
          
            # 기존 컨테이너 중지 및 제거
            echo "2. 기존 컨테이너 중지..."
            docker-compose -f docker-compose-prod.yml down
          
            # 이미지 pull
            echo "3. 최신 이미지 가져오기..."
            docker-compose -f docker-compose-prod.yml pull
          
            # 컨테이너 시작
            echo "4. 새 컨테이너 시작..."
            docker-compose -f docker-compose-prod.yml up -d
          
            # 헬스체크
            echo "5. 서비스 상태 확인..."
            sleep 10
            docker-compose -f docker-compose-prod.yml ps
          
            # 로그 확인
            echo "6. 초기 로그 확인..."
            docker-compose -f docker-compose-prod.yml logs --tail=50
          
            echo "=== 배포 완료 ==="
          EOF

      - name: Health Check
        run: |
          sleep 30
          echo "서비스 헬스체크..."
          
          # Admin 서비스 체크
          curl -f http://${{ secrets.SSH_HOST }}:8081/actuator/health || echo "Admin 서비스 헬스체크 실패"
          
          # Client 서비스 체크
          curl -f http://${{ secrets.SSH_HOST }}:8082/actuator/health || echo "Client 서비스 헬스체크 실패"
          
          # Front 서비스 체크
          curl -f http://${{ secrets.SSH_HOST }} || echo "Front 서비스 헬스체크 실패"